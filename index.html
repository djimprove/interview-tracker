<script>
const STORAGE_KEY='interviewTracker';

function loadData(){
 return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
}

function saveData(data){
 localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function updateProgress(){
 const boxes=[...document.querySelectorAll('input[type=checkbox]')];
 const checked=boxes.filter(x=>x.checked).length;
 document.getElementById('progress').innerText=Math.round((checked/boxes.length)*100)+'% ('+checked+'/'+boxes.length+')';
}

const data=loadData();
document.querySelectorAll('input[type=checkbox]').forEach(cb=>{
 const key=cb.dataset.key;
 cb.checked=!!data[key];
 cb.addEventListener('change',()=>{
   const d=loadData();
   d[key]=cb.checked;
   saveData(d);
   updateProgress();
 });
});

document.getElementById('search').addEventListener('input',e=>{
 const q=e.target.value.toLowerCase();
 document.querySelectorAll('label').forEach(l=>{
   l.style.display=l.textContent.toLowerCase().includes(q)?'block':'none';
 });
});

function resetProgress(){
 localStorage.removeItem(STORAGE_KEY);
 location.reload();
}

function exportData(){
 const blob=new Blob([localStorage.getItem(STORAGE_KEY)||'{}'],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='interview-progress.json';
 a.click();
}

document.getElementById('importFile').addEventListener('change',e=>{
 const file=e.target.files[0];
 const reader=new FileReader();
 reader.onload=function(x){
   localStorage.setItem(STORAGE_KEY,x.target.result);
   location.reload();
 }
 reader.readAsText(file);
});

updateProgress();
</script>
